<!DOCTYPE html>
<html lang="zxx">

<head>
    <title>Sistema de Gestión de Tareas :: SpaceOps</title>
    <!-- Meta tag Keywords -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8" />
    <!-- //Meta tag Keywords -->
    <link href="//fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!--/Style-CSS -->
    <link rel="stylesheet" href="css/style.css" type="text/css" media="all" />
    <!--//Style-CSS -->
    <link rel="stylesheet" href="css/font-awesome.min.css" type="text/css" media="all">

<style>

    </style>
		
</head>

<body>
    <div id="block" class="w3lvide-content" style="background: url('images/ASTRONAUT2.jpg') center; background-size:cover">

            <!-- Formulario de Inicio de Sesión -->
            <div id="frmlogin" class="workinghny-form-grid">
                <div class="main-hotair glass">
                    <div class="content-wthree" style="width: 80%;align-content: center;content: -moz-repeating-radial-gradient;justify-content: center;align-items: center;display: grid;margin-left: 9%;margin-top: 8%;margin-bottom: 8%;">
						<div class="logo" style="display: flex;justify-content: center;align-items: center;height: 100px;">
							<img src="images/Logo_SpaceOps.png" alt="Your logo" title="Your logo" class="img-fluid" style="height:300px;" />
						</div>
                        <h1 style="margin-top:35px">Inicio de Sesión</h1>
                        <form action="javascript: InicioSesion()" method="post">
                            <input id="Eml_Login" type="email" class="text" name="text" placeholder="Email de Usuario" required="" autofocus>
                            <input id="Pwd_Login" type="password" class="password" name="password" placeholder="Contraseña de Usuario" required="" autofocus>
							<button class="btn" type="submit">Iniciar Sesión</button>
                        </form>
						<button id="btnRegistro" class="btn" style="background-color: #0ca1a8;">Registrar Usuario</button>
                        
                    </div>
                </div>
				<!-- copyright-->
				<div class="copyright text-center">
					<p class="copy-footer-29">© 2025 Sistema de Gestión de Tareas | SpaceOps</p>
				</div>
		   </div>
		   
			<!-- Formulario de Registro (Oculto por defecto) -->
			<div id="frmRegistro" class="workinghny-form-grid hidden">
                <div class="main-hotair glass">
                    <div class="content-wthree" style="width: 80%;align-content: center;content: -moz-repeating-radial-gradient;justify-content: center;align-items: center;display: grid;margin-left: 9%;margin-top: 8%;margin-bottom: 8%;">
                        <div class="logo" style="display: flex;justify-content: center;align-items: center;height: 100px;">
							<img src="images/Logo_SpaceOps.png" alt="Your logo" title="Your logo" class="img-fluid" style="height:300px;" />
						</div>
						<h1 style="margin-top:35px">Registro de Usuarios</h1>
                        <form action="javascript: RegistroUsuario()" method="post">
                            <input id="Nom_Registro" type="text" class="text" name="username" placeholder="Nombre de Usuario" required>
							<input id="Eml_Registro" type="email" class="text" name="email" placeholder="Email de Usuario" required>
							<input id="Pwd_Registro" type="password" class="password" name="password" placeholder="Contraseña de Usuario" required>
							<select id="Esp_Registro" class="text" required>
								<option value="" disabled selected>Seleccione su área de trabajo</option>

								<!-- Áreas Tecnológicas -->
								<option value="ciberseguridad">Ciberseguridad</option>
								<option value="ia_ml">Inteligencia Artificial y Machine Learning</option>
								<option value="desarrollo_web">Desarrollo Web y Aplicaciones Móviles</option>
								<option value="big_data">Big Data y Analítica de Datos</option>
								<option value="cloud">Computación en la Nube</option>
								<option value="iot">Internet de las Cosas (IoT)</option>

								<!-- Áreas de Diseño y Creatividad -->
								<option value="animacion_3d">Animación Digital y 3D</option>
								<option value="multimedia">Edición de Video y Producción Multimedia</option>
								<option value="fotografia">Fotografía y Artes Visuales</option>
								<option value="ux_ui">UX/UI Design (Experiencia de Usuario y Diseño de Interfaces)</option>

								<!-- Áreas de Negocios y Administración -->
								<option value="marketing_digital">Marketing Digital y Publicidad</option>
								<option value="gestion_proyectos">Gestión de Proyectos y SCRUM</option>
								<option value="rrhh">Recursos Humanos y Desarrollo Organizacional</option>
								<option value="emprendimiento">Emprendimiento e Innovación</option>

								<!-- Áreas de Ciencias e Ingeniería -->
								<option value="biotecnologia">Biotecnología e Ingeniería Biomédica</option>
								<option value="energias_renovables">Energías Renovables y Sostenibilidad</option>
								<option value="ingenieria_civil">Ingeniería Civil y Construcción</option>
								<option value="robotica">Automatización y Robótica</option>
							</select>
                            <button class="btn" type="submit"  style="background-color: #0ca1a8;">Crear Cuenta de Usuario</button>
                        </form>
						<button id="btnRegresar" class="btn">Regresar</button>
                    </div>
                </div>
				<!-- copyright-->
				<div class="copyright text-center">
					<p class="copy-footer-29">© 2025 Sistema de Gestión de Tareas | SpaceOps</p>
				</div>
		   </div>
    </div>


	<!-- Scripts -->
    <script src="js/jquery.min.js"></script>
    <script>
        $(document).ready(function () {
            $("#btnRegistro").click(function () {
                $("#frmlogin").fadeOut(500, function () {
                    $("#frmRegistro").fadeIn(500);
                });
            });

            $("#btnRegresar").click(function () {
                $("#frmRegistro").fadeOut(500, function () {
                    $("#frmlogin").fadeIn(500);
                });
            });
        });
    </script>
  
	<script src="../JavaScript/jquery.cookie.js"></script>
    <script src="../JavaScript/InicioSesion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
